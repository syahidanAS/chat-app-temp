<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Chat App</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

* {
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* Gradient modern */
  background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
  color: white;
}

/* Container */
.login-box {
  width: 360px;
  padding: 30px;
  border-radius: 16px;

  /* Glass effect */
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);

  box-shadow: 0 20px 50px rgba(0,0,0,0.4);

  animation: fadeIn 0.6s ease;
}

/* Title */
.login-box h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 600;
}

/* Input */
.input-group {
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  outline: none;

  background: rgba(255,255,255,0.05);
  color: white;

  transition: 0.2s;
}

input:focus {
  border-color: #4cafef;
  background: rgba(255,255,255,0.1);
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;

  background: linear-gradient(135deg, #4cafef, #6366f1);
  color: white;
  font-weight: 600;

  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(99,102,241,0.4);
}

/* Error */
#error {
  margin-top: 10px;
  color: #ff6b6b;
  text-align: center;
  font-size: 13px;
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Footer text */
.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.7;
}
</style>

</head>

<body>

<div class="login-box">
  <h2>💬 Chat Login</h2>

  <div class="input-group">
    <input id="username" placeholder="Username">
  </div>

  <div class="input-group">
    <input id="password" type="password" placeholder="Password">
  </div>

  <button onclick="login()">Masuk Chat</button>

  <div id="error"></div>

  <div class="footer">
    Secure Fake Login • WebSocket Chat
  </div>
</div>

<script>
const users = {
  idan: "1234",
  jema: "1111",
  ryan: "2222",
  fakhmi: "3333"
};

function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if (users[u] && users[u] === p) {
    localStorage.setItem("username", u);
    window.location.href = "chat.html";
  } else {
    document.getElementById("error").innerText = "❌ Username atau password salah";
  }
}
</script>

</body>
</html>
